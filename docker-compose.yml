version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: hermes-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hermes_backend
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: hermes_dev_pass
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: