<!DOCTYPE html>
<html>
<head>
    <title>Auto Face Attendance</title>
</head>
<body>
    <h2>Auto Face Attendance System</h2>

    <video id="video" width="400" autoplay playsinline></video>

    <canvas id="canvas" style="display:none;"></canvas>

    <p id="result">Starting camera...</p>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const result = document.getElementById('result');

let processing = false;

// start camera
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;
    result.innerText = "Camera ready. Scanning...";
    startAutoScan();
})
.catch(err => {
    result.innerText = "Camera error: " + err;
});

// capture + send
function scanFace() {
    if (processing) return;
    processing = true;

    const ctx = canvas.getContext('2d');

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    canvas.toBlob(blob => {
        const formData = new FormData();
        formData.append("file", blob, "face.jpg");

        fetch("http://127.0.0.1:8000/check-in", {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(data => {

            let color = data.status === "present" ? "green" : "red";

            result.innerHTML = `
                <div style="color:${color}; font-size:18px;">
                    <b>Status:</b> ${data.status}<br>
                    <b>User:</b> ${data.user_id || "unknown"}<br>
                    <b>Confidence:</b> ${data.confidence || "N/A"}<br>
                    <b>Time:</b> ${data.time || "N/A"}
                </div>
            `;

            processing = false;
        })
        .catch(err => {
            result.innerText = "Error: " + err;
            processing = false;
        });

    }, "image/jpeg");
}

// auto scan loop
function startAutoScan() {
    setInterval(() => {
        if (video.videoWidth > 0) {
            scanFace();
        }
    }, 2000); // every 2 seconds
}
</script>

</body>
</html>
